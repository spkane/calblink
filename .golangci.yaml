version: "2"

run:
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing

formatters:
  enable:
    - gofmt
